about: |
  Or you can also call me Wookie. I received my integrated MSc/PhD from <a href="http://cvlab.postech.ac.kr/lab/">POSTECH Computer Vision Lab</a>, advised by <a href="http://cvlab.postech.ac.kr/~mcho/">Prof. Minsu Cho</a>.
  My research spans interactive & efficient world models and VLAs (ongoing),
  {text,image}-to-{image,3D,video} generation (<a href="https://arxiv.org/abs/2404.10603">CorrespondentDream</a>, <a href="https://arxiv.org/abs/2509.24410">RapidMV</a>, <a href="https://www.arxiv.org/abs/2509.24241">FreeAction</a>, <a href="https://arxiv.org/abs/2603.00918">SOLACE</a>),
  visual correspondence (<a href="https://openaccess.thecvf.com/content/CVPR2022/papers/Kim_TransforMatcher_Match-to-Match_Attention_for_Semantic_Correspondence_CVPR_2022_paper.pdf">TransforMatcher</a>, <a href="https://arxiv.org/abs/2311.04336">HCCNet</a>, <a href="https://arxiv.org/abs/2509.24318">MambaMatcher</a>, <a href="https://openaccess.thecvf.com/content/ICCV2021/papers/Lee_Deep_Hough_Voting_for_Robust_Global_Registration_ICCV_2021_paper.pdf">DHVR</a>),
  and 2D/3D equivariance (<a href="https://openreview.net/pdf?id=Lwp_CgpFuA0">SeLCA</a>, <a href="https://arxiv.org/abs/2306.11406">CHOIR</a>, <a href="https://arxiv.org/abs/2404.11156">RIST</a>).

