{% assign experiences = site.data.data.experiences %}
{% if experiences %}
<section class="section" id="experiences">
  <h2 class="section__title">Experiences</h2>
  <div class="exp-list">
    {% for exp in experiences %}
    <div class="exp-item{% unless exp.research %} exp-item--hidden{% endunless %}">
      <div class="exp-item__header">
        <h3 class="exp-item__role">{{ exp.role }}</h3>
        <span class="exp-item__time">{{ exp.time }}</span>
      </div>
      <p class="exp-item__company">{{ exp.company }}</p>
      {% if exp.details %}
      <div class="exp-item__details">
        {{ exp.details | markdownify }}
      </div>
      {% endif %}
    </div>
    {% endfor %}
  </div>
  <button class="toggle-btn" id="exp-toggle" onclick="toggleExperiences()">Show more</button>
</section>
{% endif %}
