{% assign pubs = site.publications | where: "selected", true | sort: "order" %}
{% if pubs.size > 0 %}
<section class="section" id="publications">
  <h2 class="section__title">Selected Publications</h2>
  <div class="pub-list">
    {% for pub in pubs %}
      {% include pub-card.html pub=pub %}
    {% endfor %}
  </div>
</section>
{% endif %}
